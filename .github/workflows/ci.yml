name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    env:
      # prisma generate tidak butuh koneksi DB nyata, tapi prisma.config.ts
      # butuh DATABASE_URL terdefinisi.
      DATABASE_URL: "postgresql://bisnismu:bisnismu@localhost:5432/bisnismu_ci"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @bisnismu/db (generate Prisma client + compile)
        run: pnpm --filter @bisnismu/db run build

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test
